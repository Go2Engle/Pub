name: Build Release DMG

on:
  release:
    types:
      - published
  workflow_dispatch:
    inputs:
      tag:
        description: Release tag to package, for example v0.1.0
        required: true
        type: string

permissions:
  contents: write

jobs:
  build-dmg:
    # macos-14 tops out at Xcode 16.x, which keeps the pre-Liquid Glass UI.
    runs-on: macos-15
    env:
      RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.event.release.tag_name }}
    steps:
      - name: Checkout release tag
        uses: actions/checkout@v4
        with:
          ref: ${{ env.RELEASE_TAG }}
          fetch-depth: 0

      - name: Set up Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: '26.3'

      - name: Build DMG
        run: ./scripts/build-dmg.sh "${RELEASE_TAG}"

      - name: Upload release assets
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          shopt -s nullglob
          assets=(dist/*.dmg dist/*.sha256)

          if [[ ${#assets[@]} -eq 0 ]]; then
            echo "No release assets found in dist/"
            exit 1
          fi

          gh release upload "${RELEASE_TAG}" "${assets[@]}" --clobber
